
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    (function() {
      var path = window.location.pathname;
      var clean = path.replace(/\/+$/, '');
      if (clean && clean !== path) {
        window.location.replace(clean + window.location.search + window.location.hash);
      } else if (!clean) {
        window.location.replace('/');
      }
    })();
  </script>
</head>
<body></body>
</html>
